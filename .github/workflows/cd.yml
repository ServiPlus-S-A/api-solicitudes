name: CD - despliegue continuo

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    name: Build, Push y Despliegue en EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/api-solicitudes:latest
            ${{ secrets.DOCKER_USER }}/api-solicitudes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copiar docker-compose.prod.yml al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "docker-compose.prod.yml"
          target: "/home/ubuntu/"

      - name: Desplegar en AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            echo ">>> Conectado al EC2. Iniciando actualización del stack..."
            cd /home/ubuntu
            
            mv -f docker-compose.prod.yml docker-compose.yml
            
            echo ">>> Autenticando en Docker Hub desde el servidor..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
            
            echo ">>> Descargando la nueva imagen desde Docker Hub..."
            docker compose pull solicitudes-api
            
            echo ">>> Recreando el contenedor de la API con la imagen nueva..."
            docker compose up -d --remove-orphans --force-recreate solicitudes-api
            
            echo ">>> Limpiando imágenes antiguas para ahorrar espacio..."
            docker image prune -f
            
            echo ">>> Verificando el estado de la aplicación mediante reintentos dinámicos..."
            set +e
            
            SUCCESS=0
            for i in $(seq 1 12); do
              STATUS=$(curl --max-time 5 -s -o /dev/null -w "%{http_code}" http://localhost:9180/api/actuator/health || echo "000")
            
              if [ "$STATUS" = "200" ]; then
                echo ">>> ¡DESPLIEGUE EXITOSO: API UP EN PUERTO 9180 tras $i intento(s)!"
                SUCCESS=1
                break
              fi
            
              echo "Intento $i/12 — HTTP Estado: $STATUS — Esperando 10 segundos..."
              sleep 10
            done
            
            if [ $SUCCESS -eq 0 ]; then
              echo ">>> ERROR: El servicio no respondió con HTTP 200 tras 2 minutos."
              echo ">>> Mostrando últimas líneas de logs del contenedor para diagnóstico:"
              docker compose logs --tail=50 solicitudes-api
              exit 1
            fi