name: Continuous Deployment (CD)

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    name: Build, Push y Despliegue en EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Agregamos Buildx para habilitar las optimizaciones de caché avanzadas
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/api-solicitudes:latest
            ${{ secrets.DOCKER_USER }}/api-solicitudes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Desplegar en AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo ">>> Conectado al EC2. Iniciando actualización del stack..."
            cd /home/ubuntu
            
            echo ">>> Descargando la nueva imagen desde Docker Hub..."
            docker compose pull solicitudes-api
            
            echo ">>> Recreando el contenedor de la API con la imagen nueva..."
            docker compose up -d --remove-orphans --force-recreate solicitudes-api
            
            echo ">>> Limpiando imágenes antiguas para ahorrar espacio..."
            docker image prune -f
            
            echo ">>> Verificando el estado de la aplicación en el puerto seguro..."
            sleep 20
            curl -f http://localhost:9180/actuator/health && echo ">>> ¡DESPLIEGUE EXITOSO: API UP EN PUERTO 9180!"