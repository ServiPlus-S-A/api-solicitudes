name: CI — Integración Continua

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: Build, Test y Calidad
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache de dependencias Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Cache de paquetes SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Dar permisos al Gradle wrapper
        run: chmod +x gradlew

      - name: Validar Token y Proyecto en SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::SONAR_TOKEN está vacío."
            exit 1
          fi
          validate_code=$(curl -s -o /tmp/sonar_validate.json -w "%{http_code}" \
            -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/authentication/validate")
          if [ "$validate_code" != "200" ]; then
            echo "::error::Token de SonarCloud inválido."
            exit 1
          fi

      - name: Ejecutar Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Pruebas Unitarias y Verificación de Cobertura (JaCoCo >= 80%)
        run: ./gradlew check --no-daemon

      - name: Análisis de Calidad SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # 💡 Al remover los flags manuales, el plugin detecta nativamente el contexto del PR en GitHub Actions
          ./gradlew sonar --no-daemon

      - name: Publicar Reporte de Cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

      - name: Qodo — revisión automática del PR
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          pr_url: ${{ github.event.pull_request.html_url }}