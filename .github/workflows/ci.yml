name: CI — Integración Continuada

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:

  ci:
    name: Build, Test y Calidad
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache de dependencias Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Dar permisos al Gradle wrapper
        run: chmod +x gradlew

      - name: Ejecutar Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Pruebas Unitarias y Verificación de Cobertura (JaCoCo >= 80%)
        run: ./gradlew check --no-daemon

      - name: Publicar Reporte de Cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

      - name: Qodo — revisión automática del PR
        uses: Codium-ai/pr-agent@main
        if: github.event_name == 'pull_request'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: "--review"

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache de dependencias y Sonar
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.sonar/cache
          key: ${{ runner.os }}-gradle-sonar-${{ hashFiles('**/*.gradle*') }}

      - name: Dar permisos al Gradle wrapper
        run: chmod +x gradlew

      - name: Generar reporte JaCoCo para SonarCloud
        run: ./gradlew test jacocoTestReport -x checkstyleMain -x checkstyleTest

      - name: Análisis SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon