spring:
  application:
    name: ${SPRING_APPLICATION_NAME:solicitudes-service}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:inmemory}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: ${OPENAPI_DOCS_PATH:/v3/api-docs}
  swagger-ui:
    path: ${OPENAPI_SWAGGER_PATH:/swagger-ui.html}

resilience4j:
  circuitbreaker:
    instances:
      externalStorage:
        sliding-window-size: ${RESILIENCE_SLIDING_WINDOW:10}
        failure-rate-threshold: ${RESILIENCE_FAILURE_RATE:50}
        wait-duration-in-open-state: ${RESILIENCE_WAIT_OPEN_MS:5000}

app:
  cache:
    solicitud-ttl-ms: ${CACHE_SOLICITUD_TTL_MS:300000}
    metricas-ttl-ms: ${CACHE_METRICAS_TTL_MS:60000}
  security:
    jwt:
      kong-issuer: ${JWT_KONG_ISSUER:traceability-dev}
      issuer-uri: ${JWT_ISSUER_URI:}
      public-key-location: ${JWT_PUBLIC_KEY_LOCATION:}
