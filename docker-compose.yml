services:
  postgres:
    image: postgres:16.8-alpine3.20
    container_name: traceability-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traceability-net

  redis:
    image: redis:7.4.9-alpine3.21
    container_name: traceability-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - traceability-net

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: traceability-minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data
    networks:
      - traceability-net

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: traceability-mailhog
    networks:
      - traceability-net

  solicitudes-api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: traceability-solicitudes-api
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: jpa
      REDIS_HOST: redis
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      JWT_PUBLIC_KEY_LOCATION: file:/keys/public.pem
      STORAGE_ENDPOINT: http://minio:9000
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - traceability-net
    volumes:
      - ./docker/keys:/keys:ro

  kong:
    image: kong:3.9.1
    container_name: traceability-kong
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/kong/docker-entrypoint-kong.sh"]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:${KONG_ADMIN_PORT}
      KONG_PROXY_LISTEN: 0.0.0.0:${KONG_PROXY_PORT}
      JWT_KONG_ISSUER: ${JWT_KONG_ISSUER}
    volumes:
      - ./docker/kong/docker-entrypoint-kong.sh:/kong/docker-entrypoint-kong.sh:ro
      - ./docker/kong/kong.services.yml:/kong/kong.services.yml:ro
      - ./docker/keys:/keys:ro
    depends_on:
      solicitudes-api:
        condition: service_healthy
    ports:
      - "${KONG_PROXY_PORT}:${KONG_PROXY_PORT}"
      - "${MAILHOG_UI_PORT}:8025"
    networks:
      - traceability-net

networks:
  traceability-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
