services:
  - name: solicitudes-service
    url: http://solicitudes-api:8080
    routes:
      - name: solicitudes-api-route
        paths:
          - /api
        strip_path: false
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
          exposed_headers:
            - X-Gateway
          credentials: true
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: correlation-id
        config:
          header_name: X-Correlation-Id
          generator: uuid
      - name: request-transformer
        config:
          add:
            headers:
              - "X-Gateway:Kong"
